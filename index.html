  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ng:antialiased}\n.layout{display:grid;grid-template-columns:252px 1fr;min-height:100vh}\n\n/* ── Sidebar ─────────────────────────────────── */\n.sidebar{background:var(--white);border-right:0.5px solid var(--g2);position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;flex-shrink:0}\n.sidebar::-webkit-scrollbar{width:3px}\n.sidebar::-webkit-scrollbar-thumb{background:var(--g2);border-radius:3px}\n.sb-logo{padding:1.35rem 1.4rem .9rem;border-bottom:0.5px solid var(--g2);flex-shrink:0}\n.sb-logo svg{display:block}\n.sb-meta{padding:.9rem 1.4rem 1rem;border-bottom:0.5px solid var(--g2);flex-shrink:0}\n.sb-meta-name{font-size:.8rem;font-weight:600;color:var(--navy-2);margin-bottom:.2rem}\n.sb-meta-sub{font-size:.7rem;color:var(--g5);line-height:1.5}\n.sb-nav{flex:1;padding:.7rem 0 1rem;overflow-y:auto}\n.sb-group-label{font-size:.62rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--g4);padding:.8rem 1.4rem .3rem}\n.sb-item{display:flex;align-items:center;gap:.55rem;padding:.4rem 1.4rem;font-size:.8rem;color:var(--g5);cursor:pointer;transition:background .12s,color .12s;user-select:none;line-height:1.35}\n.sb-item:hover{background:var(--g1);color:var(--navy-2)}\n.sb-item.active{background:var(--blue-lite);color:var(--blue);font-weight:500}\n.sb-dot{width:.36rem;height:.36rem;border-radius:50%;background:var(--g3);flex-shrink:0;transition:background .12s}\n.sb-item:hover .sb-dot{background:var(--g4)}\n.sb-item.active .sb-dot{background:var(--blue)}\n.sb-footer{padding:1rem 1.4rem;border-top:0.5px solid var(--g2);flex-shrink:0}\n.sb-prog-label{display:flex;justify-content:space-between;font-size:.67rem;color:var(--g4);margin-bottom:.35rem}\n.sb-track{height:3px;background:var(--g2);border-radius:var(--rpill);overflow:hidden}\n.sb-fill{height:100%;background:var(--blue);border-radius:var(--rpill);transition:width .3s ease}\n\n/* ── Main ─────────────────────────────────────── */\n.main{padding:2.8rem 3.2rem 5rem;max-width:860px}\n.section{display:none}\n.section.active{display:block}\n\n/* ── Hero ─────────────────────────────────────── */\n.hero{background:var(--blue);border-radius:var(--r);padding:2.8rem 3rem 2.5rem;margin-bottom:2rem;position:relative;overflow:hidden}\n.hero::before{content:'';position:absolute;right:-5rem;top:-5rem;width:22rem;height:22rem;border-radius:50%;background:rgba(255,255,255,.06);pointer-events:none}\n.hero::after{content:'';position:absolute;right:1.5rem;bottom:-7rem;width:15rem;height:15rem;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none}\n.hero-eye{font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:.7rem}\n.hero-title{font-size:2.5rem;font-weight:700;color:var(--white);line-height:1.12;letter-spacing:-.025em;margin-bottom:1.15rem}\n.hero-hr{width:100%;height:.5px;background:rgba(255,255,255,.18);margin-bottom:1.05rem}\n.hero-meta{font-size:.85rem;color:rgba(255,255,255,.7);line-height:1.7}\n.hero-meta strong{color:var(--white);font-weight:500}\n.hero-date{font-size:.77rem;color:rgba(255,255,255,.42);margin-top:.3rem}\n\n/* ── Overview grid ─────────────────────────────── */\n.ov-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.85rem;margin-bottom:1.7rem}\n.ov-card{background:var(--white);border:.5px solid var(--g2);border-radius:var(--r);padding:1.1rem 1.15rem;cursor:pointer;transition:border-color .14s,box-shadow .14s,transform .14s}\n.ov-card:hover{border-color:var(--blue-border);box-shadow:var(--sh-md);transform:translateY(-2px)}\n.ov-part{font-size:.64rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--g4);margin-bottom:.28rem}\n.ov-title{font-size:.9rem;font-weight:600;color:var(--navy-2);line-height:1.3;margin-bottom:.4rem}\n.ov-desc{font-size:.75rem;color:var(--g5);line-height:1.4}\n\n/* ── Section header ───────────────────────────── */\n.sec-head{margin-bottom:1.6rem}\n.sec-eye{display:inline-flex;align-items:center;font-size:.67rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--blue);background:var(--blue-lite);padding:.22rem .65rem;border-radius:var(--rpill);margin-bottom:.52rem}\n.sec-title{font-size:1.55rem;font-weight:700;color:var(--navy-2);line-height:1.22;letter-spacing:-.018em;margin-bottom:.38rem}\n.sec-sub{font-size:.875rem;color:var(--g5);line-height:1.65}\n\n/* ── Typography ────────────────────────────────── */\nh2{font-size:1.02rem;font-weight:600;color:var(--navy-2);margin:1.7rem 0 .65rem;letter-spacing:-.01em}\nh3{font-size:.88rem;font-weight:600;color:var(--navy-2);margin:1.1rem 0 .35rem}\np{font-size:.875rem;color:var(--g6);line-height:1.72;margin-bottom:.7rem}\np:last-child{margin-bottom:0}\nul,ol{padding-left:1.3rem;margin-bottom:.75rem}\nli{font-size:.875rem;color:var(--g6);line-height:1.7;margin-bottom:.18rem}\nli strong{color:var(--navy-2)}\n.hr{height:.5px;background:var(--g2);margin:1.5rem 0;border:none}\n\n/* ── Cards ─────────────────────────────────────── */\n.card{background:var(--white);border:.5px solid var(--g2);border-radius:var(--r);box-shadow:var(--sh)}\n.card-blue{background:var(--blue-lite);border-color:var(--blue-border)}\n.card-amber{background:var(--amber-l);border-color:var(--amber-b)}\n.card-green{background:var(--green-l);border-color:var(--green-b)}\n.card-purple{background:var(--purple-l);border-color:var(--purple-b)}\n.card-red{background:var(--red-l);border-color:var(--red-b)}\n\n/* ── Grid layouts ──────────────────────────────── */\n.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:.85rem;margin-bottom:1.3rem}\n.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:.85rem;margin-bottom:1.3rem}\n.grid-item{border-radius:var(--r);padding:1.1rem 1.15rem;transition:box-shadow .14s,transform .14s}\n.grid-item:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}\n.gi-icon{font-size:1.05rem;margin-bottom:.4rem}\n.gi-title{font-size:.84rem;font-weight:600;color:var(--navy-2);margin-bottom:.22rem}\n.gi-body{font-size:.78rem;color:var(--g5);line-height:1.55}\n\n/* ── Signal rows ───────────────────────────────── */\n.signals{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.2rem}\n.signal{display:flex;align-items:flex-start;gap:.8rem;background:var(--white);border:.5px solid var(--g2);border-radius:var(--rsm);padding:.8rem 1rem;box-shadow:var(--sh);transition:border-color .14s,box-shadow .14s}\n.signal:hover{border-color:var(--g3);box-shadow:var(--sh-md)}\n.sig-icon{width:1.65rem;height:1.65rem;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.78rem;flex-shrink:0;margin-top:.08rem}\n.sig-title{font-size:.84rem;font-weight:600;color:var(--navy-2);margin-bottom:.13rem}\n.sig-body{font-size:.78rem;color:var(--g5);line-height:1.5}\n\n/* ── Callout ───────────────────────────────────── */\n.callout{border-left:3px solid var(--blue);background:var(--blue-lite);border-radius:0 var(--rsm) var(--rsm) 0;padding:.82rem 1.05rem;font-size:.82rem;color:#1D4ED8;line-height:1.6;margin-bottom:1.05rem}\n.callout.amber{border-left-color:var(--amber);background:var(--amber-l);color:#92400E}\n.callout.green{border-left-color:var(--green);background:var(--green-l);color:#14532D}\n.callout.red{border-left-color:var(--red);background:var(--red-l);color:#991B1B}\n\n/* ── Steps ─────────────────────────────────────── */\n.steps{display:flex;flex-direction:column;gap:.62rem;margin-bottom:1.3rem}\n.step{display:flex;align-items:flex-start;gap:.88rem;background:var(--white);border:.5px solid var(--g2);border-radius:var(--r);padding:1rem 1.15rem;box-shadow:var(--sh);transition:border-color .14s,box-shadow .14s}\n.step:hover{border-color:var(--blue-border);box-shadow:var(--sh-md)}\n.step-n{width:1.75rem;height:1.75rem;border-radius:50%;font-size:.7rem;font-weight:700;color:var(--white);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--blue)}\n.step-n.green{background:var(--green)}\n.step-n.amber{background:var(--amber)}\n.step-title{font-size:.875rem;font-weight:600;color:var(--navy-2);margin-bottom:.18rem}\n.step-body{font-size:.8rem;color:var(--g5);line-height:1.55}\n\n/* ── Prose card ────────────────────────────────── */\n.prose-card{background:var(--white);border:.5px solid var(--g2);border-left:3px solid var(--blue);border-radius:0 var(--r) var(--r) 0;padding:1.25rem 1.4rem;box-shadow:var(--sh);margin-bottom:1.2rem}\n.prose-card p{font-size:.875rem;color:var(--g6);line-height:1.72;margin-bottom:.62rem}\n.prose-card p:last-child{margin-bottom:0}\n\n/* ── Stat row ──────────────────────────────────── */\n.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.85rem;margin-bottom:1.35rem}\n.stat-card{background:var(--white);border:.5px solid var(--g2);border-radius:var(--r);padding:1.15rem 1rem;text-align:center;box-shadow:var(--sh);transition:box-shadow .14s}\n.stat-card:hover{box-shadow:var(--sh-md)}\n.stat-num{font-size:2rem;font-weight:700;color:var(--blue);line-height:1;margin-bottom:.22rem}\n.stat-label{font-size:.74rem;color:var(--g5);line-height:1.45}\n\n/* ── Expandable cards ──────────────────────────── */\n.exp-card{background:var(--white);border:.5px solid var(--g2);border-radius:var(--r);margin-bottom:.62rem;box-shadow:var(--sh);overflow:hidden;transition:box-shadow .14s}\n.exp-card:hover{box-shadow:var(--sh-md)}\n.exp-header{display:flex;align-items:center;justify-content:space-between;padding:.95rem 1.15rem;cursor:pointer;gap:.75rem;user-select:none}\n.exp-header-l{display:flex;align-items:flex-start;gap:.72rem}\n.exp-num{width:1.65rem;height:1.65rem;border-radius:50%;background:var(--blue);color:var(--white);font-size:.67rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.05rem}\n.exp-q{font-size:.875rem;font-weight:600;color:var(--navy-2);line-height:1.4}\n.exp-chev{color:var(--g4);flex-shrink:0;transition:transform .2s}\n.exp-card.open .exp-chev{transform:rotate(180deg)}\n.exp-body{display:none;padding:0 1.15rem 1.05rem;border-top:.5px solid var(--g1)}\n.exp-card.open .exp-body{display:block}\n.exp-inner{padding-top:.88rem}\n\n/* ── Hypothesis pill ───────────────────────────── */\n.hyp{display:inline-flex;align-items:center;background:var(--blue-mid);border:.5px solid var(--blue-border);color:#1D4ED8;font-size:.68rem;font-weight:500;padding:.17rem .58rem;border-radius:var(--rpill);margin:.1rem .08rem 0 0}\n.hyp.amber{background:var(--amber-l);border-color:var(--amber-b);color:#92400E}\n\n/* ── Pill ──────────────────────────────────────── */\n.pill{display:inline-flex;align-items:center;font-size:.68rem;font-weight:500;padding:.17rem .58rem;border-radius:var(--rpill);margin:.08rem .08rem 0 0}\n.pill-blue{background:var(--blue-mid);color:#1D4ED8}\n.pill-green{background:var(--green-l);color:var(--green);border:.5px solid var(--green-b)}\n.pill-amber{background:var(--amber-l);color:var(--amber);border:.5px solid var(--amber-b)}\n.pill-gray{background:var(--g1);color:var(--g5);border:.5px solid var(--g2)}\n\n/* ── Table ─────────────────────────────────────── */\ntable{width:100%;border-collapse:collapse;font-size:.81rem;margin-bottom:1.2rem}\nth{background:var(--g1);color:var(--g6);font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;padding:.6rem .9rem;text-align:left;border-bottom:1.5px solid var(--g2)}\ntd{padding:.6rem .9rem;border-bottom:.5px solid var(--g1);color:var(--g6);line-height:1.5;vertical-align:top}\ntr:last-child td{border-bottom:none}\ntr:hover td{background:var(--g0)}\n\n/* ── Note ──────────────────────────────────────── */\n.note{background:var(--g1);border:.5px solid var(--g2);border-radius:var(--rsm);padding:.82rem 1.05rem;font-size:.78rem;color:var(--g5);line-height:1.55;margin-bottom:1.15rem}\n\n/* ── Feature grid ──────────────────────────────── */\n.feat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.82rem;margin-bottom:1.3rem}\n.fcard{background:var(--white);border:.5px solid var(--g2);border-radius:var(--r);padding:1.05rem 1.15rem;box-shadow:var(--sh);transition:border-color .14s,box-shadow .14s}\n.fcard:hover{border-color:var(--blue-border);box-shadow:var(--sh-md)}\n.fcard-top{display:flex;align-items:center;gap:.55rem;margin-bottom:.42rem}\n.fcard-icon{width:1.72rem;height:1.72rem;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.82rem}\n.fcard-title{font-size:.84rem;font-weight:600;color:var(--navy-2)}\n.fcard-body{font-size:.78rem;color:var(--g5);line-height:1.55}\n\n/* ── Diff annotation ───────────────────────────── */\n.diff-block{border-left:2px solid var(--g2);padding-left:.75rem;margin-top:.5rem;display:flex;flex-direction:column;gap:.26rem}\n.diff-row{display:flex;align-items:flex-start;gap:.36rem;font-size:.75rem;color:var(--g5);line-height:1.4}\n.dbadge{width:.95rem;height:.95rem;border-radius:3px;font-size:.56rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.1rem}\n.dba{background:var(--blue-mid);color:#1D4ED8}\n.dbb{background:var(--amber-l);color:var(--amber)}\n.dbe{background:var(--green-l);color:var(--green)}\n.diff-row strong{color:var(--g6)}\n\n/* ── Activity item ─────────────────────────────── */\n.phase-head{display:flex;align-items:center;gap:.55rem;margin-bottom:.7rem;margin-top:.1rem}\n.ph-badge{display:inline-flex;font-size:.62rem;font-weight:700;padding:.16rem .58rem;border-radius:var(--rpill);letter-spacing:.04em;text-transform:uppercase}\n.ph-open{background:var(--blue-mid);color:#1D4ED8}\n.ph-core{background:var(--green-l);color:var(--green)}\n.ph-ext{background:var(--purple-l);color:var(--purple)}\n.ph-close{background:var(--g1);color:var(--g5)}\n.ph-name{font-size:.82rem;font-weight:600;color:var(--navy-2)}\n.ph-time{font-size:.73rem;color:var(--g4);margin-left:auto}\n.activity{display:flex;align-items:flex-start;gap:.68rem;background:var(--white);border:.5px solid var(--g2);border-radius:var(--rsm);padding:.68rem .88rem;margin-bottom:.38rem;transition:border-color .12s}\n.activity:hover{border-color:var(--blue-border)}\n.act-icon{width:1.45rem;height:1.45rem;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.62rem;margin-top:.06rem}\n.act-v{background:var(--red-l);color:var(--red)}\n.act-l{background:var(--blue-mid);color:#1D4ED8}\n.act-q{background:var(--amber-l);color:var(--amber)}\n.act-c{background:var(--green-l);color:var(--green)}\n.act-name{font-size:.8rem;font-weight:500;color:var(--navy-2)}\n.act-meta{font-size:.7rem;color:var(--g4)}\n.seq-wrap{background:var(--white);border:.5px solid var(--g2);border-radius:var(--r);padding:1.15rem 1.2rem;box-shadow:var(--sh);margin-bottom:1.3rem}\n.seq-divider{height:.5px;background:var(--g1);margin:.9rem 0}\n\n/* ── Proto hero ────────────────────────────────── */\n.proto-hero{background:var(--navy);border-radius:var(--r);padding:2.4rem 2.6rem;margin-bottom:1.4rem;position:relative;overflow:hidden}\n.proto-hero::before{content:'';position:absolute;right:-4rem;top:-4rem;width:18rem;height:18rem;border-radius:50%;background:rgba(23,124,249,.13);pointer-events:none}\n.ph-eye{font-size:.67rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.36);margin-bottom:.52rem}\n.ph-title{font-size:1.5rem;font-weight:700;color:var(--white);line-height:1.2;letter-spacing:-.018em;margin-bottom:.8rem}\n.ph-body{font-size:.84rem;color:rgba(255,255,255,.6);line-height:1.65;margin-bottom:1.25rem}\n\n/* ── Tradeoff rows ─────────────────────────────── */\n.tradeoff-row{display:grid;grid-template-columns:1fr 1.4fr;gap:1rem;padding:.82rem 1.1rem;border-bottom:.5px solid var(--g1)}\n.tradeoff-row:last-child{border-bottom:none}\n.tr-d{font-size:.81rem;font-weight:500;color:var(--navy-2)}\n.tr-r{font-size:.79rem;color:var(--g5);line-height:1.52}\n\n/* ── Buttons ───────────────────────────────────── */\n.sec-nav{display:flex;align-items:center;justify-content:space-between;margin-top:2.8rem;padding-top:1.4rem;border-top:.5px solid var(--g2)}\n.btn{display:inline-flex;align-items:center;gap:.42rem;padding:.58rem 1.05rem;border-radius:var(--rsm);font-size:.82rem;font-weight:500;cursor:pointer;border:.5px solid var(--g2);background:var(--white);color:var(--g6);transition:all .13s;font-family:var(--font)}\n.btn:hover{border-color:var(--g3);background:var(--g1);color:var(--navy-2)}\n.btn.primary{background:var(--blue);color:var(--white);border-color:var(--blue)}\n.btn.primary:hover{background:var(--blue-h);border-color:var(--blue-h)}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"layout\">\n\n<!-- ════════ SIDEBAR ════════ -->\n<aside class=\"sidebar\">\n  <div class=\"sb-logo\">\n    <svg width=\"78\" height=\"28\" viewBox=\"0 0 93 34\" fill=\"#177CF9\" xmlns=\"http://www.w3.org/2000/svg\">\n      <path d=\"M15.242 33.988C10.985 33.988 8 26.339 8 16.994S10.985 0 15.242 0s7.242 7.649 7.242 16.994-2.985 16.994-7.242 16.994zm0-2c2.638 0 5.242-6.673 5.242-14.994S17.88 2 15.242 2 10 8.672 10 16.994s2.604 14.994 5.242 14.994z\" fill-rule=\"nonzero\"><\u002Fpath>\n      <path d=\"M11.581 10.382c8.093-4.672 16.21-5.912 18.338-2.226 2.128 3.687-2.904 10.097-10.997 14.769-8.092 4.673-16.21 5.912-18.337 2.226-2.128-3.686 2.904-10.097 10.996-14.769zm6.241 10.811c7.207-4.161 11.683-9.752 10.364-12.037-1.319-2.285-8.4-1.204-15.606 2.957C5.371 16.274.895 21.866 2.214 24.15c1.319 2.285 8.4 1.205 15.608-2.957z\" fill-rule=\"nonzero\"><\u002Fpath>\n      <path d=\"M29.919 25.151c-2.128 3.686-10.246 2.447-18.338-2.226S-1.644 11.843.484 8.157C2.613 4.47 10.73 5.71 18.822 10.382s13.125 10.082 11.097 14.769zm-1.732-1C29.506 21.866 25.03 16.275 17.822 12.114 10.615 7.953 3.535 6.872 2.216 9.157.897 11.441 5.373 17.032 12.58 21.193c7.207 4.161 14.29 5.242 15.607 2.958z\" fill-rule=\"nonzero\"><\u002Fpath>\n      <path d=\"M66.543 16.06c0 2.11-1.492 3.641-3.548 3.641-2.056 0-3.548-1.53-3.548-3.641 0-1.057.36-1.961 1.04-2.617.645-.623 1.536-.965 2.508-.965.972 0 1.862.342   <\u002Fdiv>\n  <div class=\"sb-meta\">\n    <div class=\"sb-meta-name\">AI-Assisted Lesson Planning Product Case Study<\u002Fdiv>\n    <div class=\"sb-meta-sub\">Created by Mike Stevenson\n23 April 2026<\u002Fdiv>\n  <\u002Fdiv>\n  <nav class=\"sb-nav\">\n    <div class=\"sb-group-label\">Introduction<\u002Fdiv>\n    <div class=\"sb-item active\" data-sec=\"s-intro\"><div class=\"sb-dot\"><\u002Fdiv>Overview<\u002Fdiv>\n\n    <div class=\"sb-group-label\">Part 1 · Validate the Workflow<\u002Fdiv>\n    <div class=\"sb-item\" data-sec=\"s-signals\"><div class=\"sb-dot\"><\u002Fdiv>Internal signals<\u002Fdiv>\n    <div class=\"sb-item\" data-sec=\"s-interview\"><div class=\"sb-dot\"><\u002Fdiv>Teacher interview questions<\u002Fdiv>\n    <div class=\"sb-item\" data-sec=\"s-pivot\"><div class=\"sb-dot\"><\u002Fdiv>Potential pivot signal<\u002Fdiv>\n\n    <div class=\"sb-group-label\">Part 2 · Define the Opportunity<\u002Fdiv>\n    <div class=\"sb-item\" data-sec=\"s-problem\"><div class=\"sb-dot\"><\u002Fdiv>Problem statement<\u002Fdiv>\n    <div class=\"sb-item\" data-sec=\"s-why\"><div class=\"sb-dot\"><\u002Fdiv>Why prioritise this<\u002Fdiv>\n    <div class=\"sb-item\" data-sec=\"s-winning\"><div class=\"sb-dot\"><\u002Fdiv>What winning looks like<\u002Fdiv>\n\n    <div class=\"sb-group-label\">Part 3 · Bring a Concept to Life<\u002Fdiv>\n    <div class=\"sb-item\" data-sec=\"s-concept\"><div class=\"sb-dot\"><\u002Fdiv>The concept<\u002Fdiv>\n    <div class=\"sb-item\" data-sec=\"s-prototype\"><div class=\"sb-dot\"><\u002Fdiv>Prototype walkthrough<\u002Fdiv>\n    <div class=\"sb-item\" data-sec=\"s-tradeoffs\"><div class=\"sb-dot\"><\u002Fdiv>Trade-offs &amp; decisions<\u002Fdiv>\n  <\u002Fnav>\n  <div class=\"sb-footer\">\n    <div class=\"sb-prog-label\"><span>Progress<\u002Fspan><span id=\"prog-n\">1 / 10<\u002Fspan><\u002Fdiv>\n    <div class=\"sb-track\"><div class=\"sb-fill\" id=\"prog-bar\" style=\"width:10%\"><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Faside>\n\n<!-- ════════ MAIN ════════ -->\n<main class=\"main\" id=\"main\">\n\n<!-- ─── INTRO ─── -->\n<div class=\"section active\" id=\"s-intro\">\n  <div class=\"hero\">\n    <div class=\"hero-eye\">A PRODUCT MANAGEMENT CASE STUDY<\u002Fdiv>\n    <div class=\"hero-title\">AI-Assisted Lesson Planning<\u002Fdiv>\n    <div class=\"hero-hr\"><\u002Fdiv>\n    <div class=\"hero-meta\">Prepared for Thomas O’Donahoo (Co-CEO) and Jimmy Joslin (Head of Product)\nby Mike Stevenson&nbsp;<\u002Fdiv>\n    <div class=\"hero-date\">Thursday 23 April 2026<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ov-grid\">\n    <div class=\"ov-card\" onclick=\"show('s-signals')\">\n      <div class=\"ov-part\">Part 1<\u002Fdiv>\n      <div class=\"ov-title\">Validate the Workflow<\u002Fdiv>\n      <div class=\"ov-desc\">Internal signals, teacher interview questions, and the conditions for a potential pivot.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ov-card\" onclick=\"show('s-problem')\">\n      <div class=\"ov-part\">Part 2<\u002Fdiv>\n      <div class=\"ov-title\">Define the Opportunity<\u002Fdiv>\n      <div class=\"ov-desc\">Problem statement, prioritisation rationale, and what success looks like at 90 days.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ov-card\" onclick=\"show('s-concept')\">\n      <div class=\"ov-part\">Part 3<\u002Fdiv>\n      <div class=\"ov-title\">Bring a Concept to Life<\u002Fdiv>\n      <div class=\"ov-desc\">Workflow concept, interactive prototype, and the trade-offs made to prioritise speed and teacher clarity.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"note\">This document is designed to be read independently without a presenter. Use the sidebar to navigate between sections. Expand any question card to reveal the hypothesis it is testing.<\u002Fdiv>\n  <div class=\"sec-nav\" style=\"margin-top:1.5rem;padding-top:1.2rem\">\n    <div><\u002Fdiv>\n    <button class=\"btn primary\" onclick=\"show('s-signals')\">Begin: Part 1 →<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ─── SIGNALS ─── -->\n<div class=\"section\" id=\"s-signals\">\n  <div class=\"sec-head\">\n    <div class=\"sec-eye\">Part 1 · Validate the Workflow<\u002Fdiv>\n    <div class=\"sec-title\">What internal signals confirm planning structure is the bottleneck?<\u002Fdiv>\n    <div class=\"sec-sub\">Before building, we confirm we are solving the right friction point. These five signal sources triangulate whether the problem is workflow structure or content quality — and require us to distinguish them before committing to a direction.<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"signals\">\n    <div class=\"signal\">\n      <div class=\"sig-icon\" style=\"background:#EFF6FF;\">📊<\u002Fdiv>\n      <div>\n        <div class=\"sig-title\">Amplitude — user journey &amp; task attrition data<\u002Fdiv>\n        <div class=\"sig-body\">Current user journey with a specific view on task attrition and time spent on planning. Long dwell times followed by session abandonment without task assignment suggest planning structure is the barrier, not content availability.<\u002Fdiv>\n        <div style=\"margin-top:.38rem\"><span class=\"hyp\">H1: Hard things take time — people give up<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"signal\">\n      <div class=\"sig-icon\" style=\"background:#F0FDF4;\">⏱<\u002Fdiv>\n      <div>\n        <div class=\"sig-title\">Time from Class creation to first Task assignment<\u002Fdiv>\n        <div class=\"sig-body\">Teachers who treat Atomi as more than a content library assign tasks shortly after class creation. A long lag between class creation and first assignment signals planning is happening outside the platform.<\u002Fdiv>\n        <div style=\"margin-top:.38rem\"><span class=\"hyp\">H2: Teachers who plan in Atomi assign tasks for lessons<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"signal\">\n      <div class=\"sig-icon\" style=\"background:#FFFBEB;\">🎫<\u002Fdiv>\n      <div>\n        <div class=\"sig-title\">Customer Support tickets related to lesson planning<\u002Fdiv>\n        <div class=\"sig-body\">Volume and category of support tickets. Tickets referencing lesson structure, sequencing, or planning friction confirm the gap is user-visible and worth reporting. Tickets primarily about content quality would indicate a different root cause.<\u002Fdiv>\n        <div style=\"margin-top:.38rem\"><span class=\"hyp\">H3: Users create tickets for problems they care enough to report<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"signal\">\n      <div class=\"sig-icon\" style=\"background:#F5F3FF;\">💡<\u002Fdiv>\n      <div>\n        <div class=\"sig-title\">Feature Requests Log<\u002Fdiv>\n        <div class=\"sig-body\">Frequency and nature of planning-related feature requests. High volume of requests for lesson sequencing, differentiation tooling, or curriculum mapping confirms demand. Requests predominantly for more subjects or topics would point to a content problem.<\u002Fdiv>\n        <div style=\"margin-top:.38rem\"><span class=\"hyp\">H4: Users ask for things they want<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"signal\">\n      <div class=\"sig-icon\" style=\"background:#FEF2F2;\">💰<\u002Fdiv>\n      <div>\n        <div class=\"sig-title\">Sales, Customer Success &amp; CRM<\u002Fdiv>\n        <div class=\"sig-body\">Qualitative feedback from Sales and CS teams who are closest to teacher pain. CRM data on feature-linked retention and revenue — users demonstrating lesson planning behaviour should show higher retention and LTV if this is the right problem to solve.<\u002Fdiv>\n        <div style=\"margin-top:.38rem\">\n          <span class=\"hyp\">H5: Sales advocate for features customers want<\u002Fspan>\n          <span class=\"hyp\">H6: Lesson planning behaviour correlates with retention and revenue<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"callout\">Taken together, these five signals triangulate the true friction point. If all five point toward planning structure, we proceed. If they split — high content-gap tickets, requests primarily for new subjects — we reframe as a content problem before building anything.<\u002Fdiv>\n  <div class=\"sec-nav\">\n    <button class=\"btn\" onclick=\"show('s-intro')\">← Overview<\u002Fbutton>\n    <button class=\"btn primary\" onclick=\"show('s-interview')\">Next: Teacher interview questions →<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ─── INTERVIEW ─── -->\n<div class=\"section\" id=\"s-interview\">\n  <div class=\"sec-head\">\n    <div class=\"sec-eye\">Part 1 · Validate the Workflow<\u002Fdiv>\n    <div class=\"sec-title\">3 questions to understand how a teacher decides on lesson flow<\u002Fdiv>\n    <div class=\"sec-sub\">These questions surface actual teacher behaviour — not stated preferences. Click any question card to reveal the hypothesis it is testing and why it shapes what we build.<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"exp-card\" id=\"eq1\">\n    <div class=\"exp-header\" onclick=\"toggleExp('eq1')\">\n      <div class=\"exp-header-l\"><div class=\"exp-num\">01<\u002Fdiv><div class=\"exp-q\">“Tell me about a lesson plan that caused you significant pain or difficulty — why was it so hard?”<\u002Fdiv><\u002Fdiv>\n      <svg class=\"exp-chev\" width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M4 6l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n    <\u002Fdiv>\n    <div class=\"exp-body\"><div class=\"exp-inner\">\n      <p>This surfaces actual behaviour rather than stated preference and reveals whether the bottleneck is finding content, sequencing activities, or writing the surrounding structure. Teachers often describe pain in terms of time — but the source of that time cost determines where the product intervenes.<\u002Fp>\n      <div class=\"callout\"><strong>H1:<\u002Fstrong> Lesson planning is painful and mostly a hygiene factor optimised by reducing pain. If teachers consistently describe friction at the sequencing and differentiation stage — not the content discovery stage — this validates workflow as the bottleneck.<\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"exp-card\" id=\"eq2\">\n    <div class=\"exp-header\" onclick=\"toggleExp('eq2')\">\n      <div class=\"exp-header-l\"><div class=\"exp-num\">02<\u002Fdiv><div class=\"exp-q\">“What parts of lesson planning bring you joy or satisfaction?”<\u002Fdiv><\u002Fdiv>\n      <svg class=\"exp-chev\" width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M4 6l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n    <\u002Fdiv>\n    <div class=\"exp-body\"><div class=\"exp-inner\">\n      <p>Even hygiene-factor workflows contain moments of craft and professional agency. A teacher who finds satisfaction in tailoring a lesson for a specific student may resist automation that removes that moment — regardless of the time it saves.<\u002Fp>\n      <div class=\"callout\"><strong>H2:<\u002Fstrong> Even hygiene factors can bring positive user experiences. Any solution needs to retain those moments. Understanding what teachers value preserves them as editable, teacher-owned decisions rather than invisible defaults.<\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"exp-card\" id=\"eq3\">\n    <div class=\"exp-header\" onclick=\"toggleExp('eq3')\">\n      <div class=\"exp-header-l\"><div class=\"exp-num\">03<\u002Fdiv><div class=\"exp-q\">“If I gave you a fully populated lesson for next Tuesday right now, what would you still need to change before you could use it?”<\u002Fdiv><\u002Fdiv>\n      <svg class=\"exp-chev\" width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M4 6l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n    <\u002Fdiv>\n    <div class=\"exp-body\"><div class=\"exp-inner\">\n      <p>This reveals the real personalisation burden — the minimum customisation layer the product must support. The answer defines exactly what must be editable and what can be a sensible default. Getting this wrong means building a plan no teacher actually uses.<\u002Fp>\n      <div class=\"callout\"><strong>H3:<\u002Fstrong> No two students or classes are the same. Every lesson plan needs customisation to truly meet student needs. The goal is not to eliminate customisation — it is to reduce the assembly burden so the teacher’s time is spent on pedagogy, not logistics.<\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"sec-nav\">\n    <button class=\"btn\" onclick=\"show('s-signals')\">← Internal signals<\u002Fbutton>\n    <button class=\"btn primary\" onclick=\"show('s-pivot')\">Next: Potential pivot signal →<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ─── PIVOT ─── -->\n<div class=\"section\" id=\"s-pivot\">\n  <div class=\"sec-head\">\n    <div class=\"sec-eye\">Part 1 · Validate the Workflow<\u002Fdiv>\n    <div class=\"sec-title\">What feedback would signal this is a content problem, not a workflow problem?<\u002Fdiv>\n    <div class=\"sec-sub\">Intellectual honesty requires defining pivot conditions before seeing the data. These are the signals that would redirect investment to content quality or breadth rather than planning tooling.<\u002Fdiv>\n  <\u002Fdiv>\n  <h2>Stop signals<\u002Fh2>\n  <div class=\"signals\">\n    <div class=\"signal\"><div class=\"sig-icon\" style=\"background:var(--red-l);color:var(--red);font-weight:700;\">✗<\u002Fdiv><div><div class=\"sig-title\">Support tickets are primarily about content quality or gaps<\u002Fdiv><div class=\"sig-body\">Teachers reporting missing subjects, incorrect syllabus alignment, or poor video quality — rather than planning friction — indicates the bottleneck is upstream of workflow entirely.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"signal\"><div class=\"sig-icon\" style=\"background:var(--red-l);color:var(--red);font-weight:700;\">✗<\u002Fdiv><div><div class=\"sig-title\">CRM data shows customer concerns are primarily content-related<\u002Fdiv><div class=\"sig-body\">Sales and CS teams citing content coverage as the primary barrier to conversion or retention points directly to a content problem, not a workflow problem.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"signal\"><div class=\"sig-icon\" style=\"background:var(--red-l);color:var(--red);font-weight:700;\">✗<\u002Fdiv><div><div class=\"sig-title\">User attrition is predominantly at the content exploration stage<\u002Fdiv><div class=\"sig-body\">If teachers drop off while browsing content — rather than at the planning and assignment stage — they are not finding what they need to plan with, regardless of how smooth the planning workflow is.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"signal\"><div class=\"sig-icon\" style=\"background:var(--red-l);color:var(--red);font-weight:700;\">✗<\u002Fdiv><div><div class=\"sig-title\">Teacher users do not assign tasks or lessons to students<\u002Fdiv><div class=\"sig-body\">If teachers browse and log content but never assign it, the value of a planning layer is moot — there is no planning happening inside the platform to streamline.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"signal\"><div class=\"sig-icon\" style=\"background:var(--red-l);color:var(--red);font-weight:700;\">✗<\u002Fdiv><div><div class=\"sig-title\">No correlation between lesson planning behaviour and retention or revenue<\u002Fdiv><div class=\"sig-body\">If users who attempt to plan in Atomi show the same retention and LTV as those who do not, planning is not the value driver — and building this feature will not move the business metrics that matter.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"callout red\">The pivot trigger is not a single data point — it is a consistent pattern across multiple signal sources pointing toward content. If signals split, run targeted teacher interviews to resolve the ambiguity before proceeding to Part 2.<\u002Fdiv>\n  <div class=\"sec-nav\">\n    <button class=\"btn\" onclick=\"show('s-interview')\">← Teacher interview<\u002Fbutton>\n    <button class=\"btn primary\" onclick=\"show('s-problem')\">Part 2: Define the Opportunity →<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ─── PROBLEM ─── -->\n<div class=\"section\" id=\"s-problem\">\n  <div class=\"sec-head\">\n    <div class=\"sec-eye\">Part 2 · Define the Opportunity<\u002Fdiv>\n    <div class=\"sec-title\">Problem Statement<\u002Fdiv>\n    <div class=\"sec-sub\">Written for the squad. Specific enough to eliminate solutions that would not address root friction, broad enough to leave room for creative approaches.<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"prose-card\">\n    <p>Secondary teachers using Atomi have access to high-quality, curriculum-aligned content and class performance data, <strong>but no structured way to connect those two things into a coherent lesson.<\u002Fstrong><\u002Fp>\n    <p>As a result, they switch between Atomi and external tools, manually rebuild sequences Atomi’s data could generate for them, and <strong>spend planning time on assembly rather than pedagogy.<\u002Fstrong><\u002Fp>\n    <p>The opportunity is to make the next lesson <strong>the natural output of last lesson’s data, directly inside the platform.<\u002Fstrong><\u002Fp>\n  <\u002Fdiv>\n  <h2>What the statement does and does not say<\u002Fh2>\n  <div class=\"grid-3\">\n    <div class=\"grid-item card\" style=\"padding:1.05rem 1.1rem\"><div class=\"gi-icon\">✓<\u002Fdiv><div class=\"gi-title\">About workflow, not content<\u002Fdiv><div class=\"gi-body\">Teachers already have the content. The problem is the manual assembly and sequencing that happens outside Atomi between content discovery and delivery.<\u002Fdiv><\u002Fdiv>\n    <div class=\"grid-item card\" style=\"padding:1.05rem 1.1rem\"><div class=\"gi-icon\">✓<\u002Fdiv><div class=\"gi-title\">Uses existing data as the input<\u002Fdiv><div class=\"gi-body\">Atomi already has class performance data, student profiles, and curriculum alignment. These signals are not yet connected to lesson construction.<\u002Fdiv><\u002Fdiv>\n    <div class=\"grid-item card\" style=\"padding:1.05rem 1.1rem\"><div class=\"gi-icon\">✗<\u002Fdiv><div class=\"gi-title\">Does not prescribe a solution<\u002Fdiv><div class=\"gi-body\">The statement does not assume the answer is AI generation, a template library, or a recommendation engine. The solution space remains deliberately open.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"sec-nav\">\n    <button class=\"btn\" onclick=\"show('s-pivot')\">← Pivot signal<\u002Fbutton>\n    <button class=\"btn primary\" onclick=\"show('s-why')\">Next: Why prioritise this →<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ─── WHY ─── -->\n<div class=\"section\" id=\"s-why\">\n  <div class=\"sec-head\">\n    <div class=\"sec-eye\">Part 2 · Define the Opportunity<\u002Fdiv>\n    <div class=\"sec-title\">Why prioritise this over other features?<\u002Fdiv>\n    <div class=\"sec-sub\">The biggest challenge teachers face with lesson planning is time. This is the argument for why solving that problem now is the highest-value move available to the product.<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"stat-row\">\n    <div class=\"stat-card\"><div class=\"stat-num\">20 min<\u002Fdiv><div class=\"stat-label\">saved per lesson equals a month of teacher time saved each year&nbsp;<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat-card\"><div class=\"stat-num\">#1<\u002Fdiv><div class=\"stat-label\">highest-frequency teacher behaviour — a lesson is planned every single week<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat-card\"><div class=\"stat-num\">DAU+<\u002Fdiv><div class=\"stat-label\">single strongest daily active user lever available to the platform<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"steps\">\n    <div class=\"step\"><div class=\"step-n\">1<\u002Fdiv><div><div class=\"step-title\">Frequency creates compounding value<\u002Fdiv><div class=\"step-body\">Lesson planning is the highest-frequency teacher behaviour. A teacher plans every lesson, every week. A feature that saves 20 minutes per lesson saves a teacher a month of work per year. No lower-frequency feature can match the cumulative time saving of improving the workflow a teacher touches every single week.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">2<\u002Fdiv><div><div class=\"step-title\">It is the single strongest retention and DAU lever available<\u002Fdiv><div class=\"step-body\">Planning inside Atomi creates a switching cost our content library alone does not. Once a teacher builds their week’s lessons in Atomi, their workflow is anchored there. Content-only tools are substitutable; workflow tools that own the planning habit are not.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">3<\u002Fdiv><div><div class=\"step-title\">It changes the North American market conversation<\u002Fdiv><div class=\"step-body\">For the NA expansion, showing a prospective school that Atomi reduces teacher workload — not just supplements student revision — changes the conversation from “another nice-to-have classroom resource” to Atomi as an essential Teacher productivity tool that enables teachers and teacher retention. That is a materially stronger position in a competitive new market.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"sec-nav\">\n    <button class=\"btn\" onclick=\"show('s-problem')\">← Problem statement<\u002Fbutton>\n    <button class=\"btn primary\" onclick=\"show('s-winning')\">Next: What winning looks like →<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ─── WINNING ─── -->\n<div class=\"section\" id=\"s-winning\">\n  <div class=\"sec-head\">\n    <div class=\"sec-eye\">Part 2 · Define the Opportunity<\u002Fdiv>\n    <div class=\"sec-title\">What winning looks like on a teacher’s Monday morning at 90 days<\u002Fdiv>\n    <div class=\"sec-sub\">Success is not a metric in isolation — it is a lived experience. This scenario defines what “done” means for the teacher’s weekly planning workflow.<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"steps\">\n    <div class=\"step\"><div class=\"step-n\">1<\u002Fdiv><div><div class=\"step-title\">Sunday night: the plan is already waiting<\u002Fdiv><div class=\"step-body\">A teacher opens Atomi on Sunday night and sees a suggested lesson structure for Monday based on academic progress, student behaviour management plans and learning accessibility needs — ready to confidently deliver differentiation across the class.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n green\">2<\u002Fdiv><div><div class=\"step-title\">Under 15 minutes to a plan she can actually use<\u002Fdiv><div class=\"step-body\">She adjusts two activities to account for the three students who need further extension and closes the laptop in under 15 minutes. She no longer opens a separate document, a curriculum map, or a Google Drive folder to do this.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n amber\">3<\u002Fdiv><div><div class=\"step-title\">Tuesday: the plan becomes a shared asset<\u002Fdiv><div class=\"step-body\">She gets a text from her colleague while walking to work. He’s forgotten to prepare his class for 9am. She opens her lesson plan on Atomi, clicks Share, and texts him back the link. The core lesson plan lives in Atomi and can be customised and shared with other Atomi teachers.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <h2>Success metrics at 90 days<\u002Fh2>\n  <table>\n    <thead><tr><th>Metric<\u002Fth><th>What it measures<\u002Fth><th>Target direction<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td><strong>Time from login to first task assigned<\u002Fstrong><\u002Ftd><td>Planning workflow speed inside Atomi<\u002Ftd><td>↓ Reduce &gt;30%<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Weekly active teacher sessions<\u002Fstrong><\u002Ftd><td>Planning as a recurring weekly habit, not a one-off<\u002Ftd><td>↑ Increase DAU/WAU<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Share feature usage<\u002Fstrong><\u002Ftd><td>Lesson plans becoming collaborative assets<\u002Ftd><td>New metric baseline<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Teacher retention at 90 days<\u002Fstrong><\u002Ftd><td>Stickiness of the planning workflow vs. control<\u002Ftd><td>↑ vs. control cohort<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n  <div class=\"sec-nav\">\n    <button class=\"btn\" onclick=\"show('s-why')\">← Why prioritise<\u002Fbutton>\n    <button class=\"btn primary\" onclick=\"show('s-concept')\">Part 3: Bring a Concept to Life →<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ─── CONCEPT ─── -->\n<div class=\"section\" id=\"s-concept\">\n  <div class=\"sec-head\">\n    <div class=\"sec-eye\">Part 3 · Bring a Concept to Life<\u002Fdiv>\n    <div class=\"sec-title\">The Lesson Planner — workflow concept<\u002Fdiv>\n    <div class=\"sec-sub\">The concept connects three inputs already inside Atomi — last lesson’s performance data, the next syllabus topic, and student profile flags — to produce a ready-to-assign lesson structure in one place, in minutes.<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"prose-card\" style=\"margin-bottom:1.4rem\">\n    <p>Atomi already has everything needed to build the next lesson: quiz performance data showing which concepts are weak, student accessibility and behaviour profiles, and a curriculum-aligned content library. The gap is not data or content — it is the connection between them.<\u002Fp>\n    <p>The Lesson Planner makes that connection explicit. It turns last lesson’s exit data into this lesson’s starting point, automatically surfaces the right Atomi content for each student group, and annotates the plan with the specific classroom adjustments each student’s profile requires.<\u002Fp>\n  <\u002Fdiv>\n  <h2>The three inputs<\u002Fh2>\n  <div class=\"grid-3\">\n    <div class=\"grid-item card-blue\" style=\"border-radius:var(--r);padding:1.05rem 1.1rem\"><div class=\"gi-icon\">📊<\u002Fdiv><div class=\"gi-title\" style=\"color:#1D4ED8\">Last lesson’s performance data<\u002Fdiv><div class=\"gi-body\" style=\"color:#1D4ED8;opacity:.8\">Quiz scores, completion rates, and which concepts the class — and individual students — are still working to master.<\u002Fdiv><\u002Fdiv>\n    <div class=\"grid-item card-purple\" style=\"border-radius:var(--r);padding:1.05rem 1.1rem\"><div class=\"gi-icon\">📚<\u002Fdiv><div class=\"gi-title\" style=\"color:var(--purple)\">Next topic in scope &amp; sequence<\u002Fdiv><div class=\"gi-body\" style=\"color:var(--purple);opacity:.8\">Teacher confirms the next topic. Atomi maps curriculum-aligned content to that topic automatically from the existing library.<\u002Fdiv><\u002Fdiv>\n    <div class=\"grid-item card-green\" style=\"border-radius:var(--r);padding:1.05rem 1.1rem\"><div class=\"gi-icon\">👤<\u002Fdiv><div class=\"gi-title\" style=\"color:var(--green)\">Student profile flags<\u002Fdiv><div class=\"gi-body\" style=\"color:var(--green);opacity:.8\">Accessibility adjustments and behaviour support plans stored in student profiles — surfaced at the activity level, not as a separate document to cross-reference.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <h2>The workflow — from data to assigned lesson<\u002Fh2>\n  <div class=\"steps\">\n    <div class=\"step\"><div class=\"step-n\">1<\u002Fdiv><div><div class=\"step-title\">Dashboard entry point<\u002Fdiv><div class=\"step-body\">The teacher sees a “Your next lesson is ready to review” prompt on their Atomi dashboard, generated from the previous lesson’s data. The plan is pre-built — not a blank template waiting to be filled.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">2<\u002Fdiv><div><div class=\"step-title\">Class profile summary<\u002Fdiv><div class=\"step-body\">A class-level view shows which students need consolidation, which are ready for extension, and how many have active accessibility or behaviour plans — without exposing individual student records in the plan view.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">3<\u002Fdiv><div><div class=\"step-title\">Annotated lesson sequence<\u002Fdiv><div class=\"step-body\">Five phases — Bell Ringer, Open, Core, Extend, Close — pre-populated with Atomi content. Each activity is annotated inline with the specific adjustments each student’s profile requires: extended time, reduced task load, regulation support, seating considerations.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">4<\u002Fdiv><div><div class=\"step-title\">Teacher edits and assigns<\u002Fdiv><div class=\"step-body\">The teacher can swap any activity for an Atomi alternative, add their own custom items, adjust homework tasks, edit lesson goals and success criteria, and assign the complete plan to the class in one action — without leaving Atomi.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"callout\">The plan is an opinionated default with easy overrides. The teacher’s job is to review and adjust, not to build from scratch. That is the core time saving the concept delivers.<\u002Fdiv>\n  <div class=\"sec-nav\">\n    <button class=\"btn\" onclick=\"show('s-winning')\">← What winning looks like<\u002Fbutton>\n    <button class=\"btn primary\" onclick=\"show('s-prototype')\">Next: Prototype walkthrough →<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ─── PROTOTYPE ─── -->\n<div class=\"section\" id=\"s-prototype\">\n  <div class=\"sec-head\">\n    <div class=\"sec-eye\">Part 3 · Bring a Concept to Life<\u002Fdiv>\n    <div class=\"sec-title\">Prototype walkthrough<\u002Fdiv>\n    <div class=\"sec-sub\">The prototype is a working, interactive representation of the Lesson Planner built in Atomi’s visual language. It demonstrates the full teacher journey from dashboard entry through to lesson assignment and reflection.<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"proto-hero\">\n    <div class=\"ph-eye\">INTERACTIVE PROTOTYPE<\u002Fdiv>\n    <div class=\"ph-title\">AI-Assisted Lesson Planner<\u002Fdiv>\n    <div class=\"ph-body\">A fully interactive prototype demonstrating the complete lesson planning workflow for Mathematics 9A — Real Number System. Includes class profile, differentiation annotations, curriculum alignment, student attention flags, homework auto-assignment, lesson goals, success criteria, and post-lesson reflection with voice notes.<\u002Fdiv>\n    <div style=\"display:flex;gap:.75rem;flex-wrap:wrap\">\n      <button class=\"btn\" style=\"background:var(--blue);color:#fff;border-color:var(--blue)\" onclick=\"openProto()\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M9 3h4v4M13 3l-6 6M6 4H3v9h9v-3\" stroke=\"currentColor\" stroke-width=\"1.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        View prototype\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <h2>What the prototype demonstrates<\u002Fh2>\n  <div class=\"feat-grid\">\n    <div class=\"fcard\"><div class=\"fcard-top\"><div class=\"fcard-icon\" style=\"background:var(--blue-lite);\">🏠<\u002Fdiv><div class=\"fcard-title\">Dashboard entry point<\u002Fdiv><\u002Fdiv><div class=\"fcard-body\">A “Your next lesson is ready” banner makes the planning workflow the natural next step — not something the teacher has to seek out from the content library.<\u002Fdiv><\u002Fdiv>\n    <div class=\"fcard\"><div class=\"fcard-top\"><div class=\"fcard-icon\" style=\"background:var(--green-l);\">👥<\u002Fdiv><div class=\"fcard-title\">Class profile &amp; student needs<\u002Fdiv><\u002Fdiv><div class=\"fcard-body\">Class-level summary of consolidation and extension numbers, with separate accessibility and behaviour plan breakdowns, without exposing individual student records in the plan view.<\u002Fdiv><\u002Fdiv>\n    <div class=\"fcard\"><div class=\"fcard-top\"><div class=\"fcard-icon\" style=\"background:var(--amber-l);\">📋<\u002Fdiv><div class=\"fcard-title\">Inline differentiation annotations<\u002Fdiv><\u002Fdiv><div class=\"fcard-body\">Every activity card carries <span class=\"pill pill-blue\">A<\u002Fspan> accessibility, <span class=\"pill pill-amber\">B<\u002Fspan> behaviour, and <span class=\"pill pill-green\">E<\u002Fspan> extension annotations inline — plan and adjustments are read together, not in separate documents.<\u002Fdiv><\u002Fdiv>\n    <div class=\"fcard\"><div class=\"fcard-top\"><div class=\"fcard-icon\" style=\"background:var(--purple-l);\">🔄<\u002Fdiv><div class=\"fcard-title\">Swap, remove &amp; add<\u002Fdiv><\u002Fdiv><div class=\"fcard-body\">Every activity has a working Swap button that opens a content picker with Atomi alternatives. Teachers can also add custom items to any phase or remove activities that do not fit their class.<\u002Fdiv><\u002Fdiv>\n    <div class=\"fcard\"><div class=\"fcard-top\"><div class=\"fcard-icon\" style=\"background:var(--blue-lite);\">🗺<\u002Fdiv><div class=\"fcard-title\">Curriculum map<\u002Fdiv><\u002Fdiv><div class=\"fcard-body\">A three-node visual map — Previous lesson → Today → Next lesson — shows where today’s lesson sits in the sequence, with a switchable curriculum alignment selector for AU, US, NZ, and UK.<\u002Fdiv><\u002Fdiv>\n    <div class=\"fcard\"><div class=\"fcard-top\"><div class=\"fcard-icon\" style=\"background:var(--green-l);\">🎯<\u002Fdiv><div class=\"fcard-title\">Goals &amp; success criteria<\u002Fdiv><\u002Fdiv><div class=\"fcard-body\">Pre-populated lesson goals and student-facing learning intentions (“We are learning to…”) with observable success criteria — all editable inline, aligned to the NSW DoE and UC Canberra lesson plan frameworks.<\u002Fdiv><\u002Fdiv>\n    <div class=\"fcard\"><div class=\"fcard-top\"><div class=\"fcard-icon\" style=\"background:var(--amber-l);\">📚<\u002Fdiv><div class=\"fcard-title\">Homework auto-assignment<\u002Fdiv><\u002Fdiv><div class=\"fcard-body\">Suggested Atomi Tasks pre-populated as homework, set to assign automatically to students when the lesson ends. Teachers can edit due dates, remove tasks, or add from the Atomi library.<\u002Fdiv><\u002Fdiv>\n    <div class=\"fcard\"><div class=\"fcard-top\"><div class=\"fcard-icon\" style=\"background:var(--purple-l);\">📝<\u002Fdiv><div class=\"fcard-title\">Reflection &amp; voice notes<\u002Fdiv><\u002Fdiv><div class=\"fcard-body\">A post-lesson reflection section with text input and a live voice note recorder — timed, saved to the plan, and used to inform future plan suggestions. Includes a Mark lesson complete button.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n\n  <div class=\"sec-nav\">\n    <button class=\"btn\" onclick=\"show('s-concept')\">← The concept<\u002Fbutton>\n    <button class=\"btn primary\" onclick=\"show('s-tradeoffs')\">Next: Trade-offs &amp; decisions →<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ─── TRADEOFFS ─── -->\n<div class=\"section\" id=\"s-tradeoffs\">\n  <div class=\"sec-head\">\n    <div class=\"sec-eye\">Part 3 · Bring a Concept to Life<\u002Fdiv>\n    <div class=\"sec-title\">Trade-offs &amp; decisions<\u002Fdiv>\n    <div class=\"sec-sub\">Every product decision is a trade-off. These are the explicit choices made in scoping this concept and the rationale behind each one — the things this panel will probe on in Q&amp;A.<\u002Fdiv>\n  <\u002Fdiv>\n  <h2>Scope decisions<\u002Fh2>\n  <div style=\"background:var(--white);border:.5px solid var(--g2);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);margin-bottom:1.4rem\">\n    <div style=\"display:grid;grid-template-columns:1fr 1.4fr;gap:1rem;padding:.55rem 1.1rem;background:var(--g0);border-bottom:.5px solid var(--g2)\">\n      <div style=\"font-size:.68rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--g4)\">Decision<\u002Fdiv>\n      <div style=\"font-size:.68rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--g4)\">Rationale<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tradeoff-row\"><div class=\"tr-d\">Opinionated defaults with easy overrides — not a blank canvas planner<\u002Fdiv><div class=\"tr-r\">A blank canvas requires the teacher to do all the work. Opinionated defaults are the core time saving. The risk is that defaults are occasionally wrong — which is why every element is swappable, removable, and overridable with one click.<\u002Fdiv><\u002Fdiv>\n    <div class=\"tradeoff-row\"><div class=\"tr-d\">Only existing Atomi content populates the plan in v1<\u002Fdiv><div class=\"tr-r\">The concept ships faster and reinforces the value of the existing content library. AI-generated activities are a v2 capability, not a v1 dependency. The workflow innovation stands independently of the content generation question.<\u002Fdiv><\u002Fdiv>\n    <div class=\"tradeoff-row\"><div class=\"tr-d\">Class-level profile view, not individual student records in the plan<\u002Fdiv><div class=\"tr-r\">Surfacing individual student names in a plan view creates privacy risk and visual noise. Class-level aggregates are sufficient for planning decisions and preserve appropriate data boundaries.<\u002Fdiv><\u002Fdiv>\n    <div class=\"tradeoff-row\"><div class=\"tr-d\">Behaviour and accessibility plans captured in Atomi student profiles — no external SIS integration in v1<\u002Fdiv><div class=\"tr-r\">Integrating with Compass, Sentral, or Schoology is a meaningful technical problem that would delay the feature by months. Teacher-maintained profiles in Atomi are sufficient to validate the value before committing to integration investment.<\u002Fdiv><\u002Fdiv>\n    <div class=\"tradeoff-row\"><div class=\"tr-d\">Curriculum alignment is teacher-selected, not auto-detected<\u002Fdiv><div class=\"tr-r\">Auto-detection across AC, Common Core, NCEA, and GCSE is a significant mapping problem. A teacher-selected dropdown delivers the same UI benefit immediately, with auto-detect as a later quality improvement.<\u002Fdiv><\u002Fdiv>\n    <div class=\"tradeoff-row\" style=\"border-bottom:none\"><div class=\"tr-d\">Full scope-and-sequence management is out of scope for v1<\u002Fdiv><div class=\"tr-r\">The teacher confirms the next topic rather than having Atomi manage the full curriculum year. This is a material workflow improvement on its own, without requiring Atomi to solve curriculum mapping — which is a distinct, larger product surface.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <h2>What is explicitly out of scope for v1<\u002Fh2>\n  <div class=\"grid-3\">\n    <div class=\"grid-item card\" style=\"padding:1rem 1.05rem\"><div class=\"gi-title\">AI content generation<\u002Fdiv><div class=\"gi-body\">The plan populates with existing Atomi content only. AI-generated activities, assessments, or explanations are a v2 capability.<\u002Fdiv><\u002Fdiv>\n    <div class=\"grid-item card\" style=\"padding:1rem 1.05rem\"><div class=\"gi-title\">External SIS integration<\u002Fdiv><div class=\"gi-body\">Student profile data is entered into Atomi directly. Integration with Compass, Sentral, or Schoology is post-validation.<\u002Fdiv><\u002Fdiv>\n    <div class=\"grid-item card\" style=\"padding:1rem 1.05rem\"><div class=\"gi-title\">Full curriculum mapping<\u002Fdiv><div class=\"gi-body\">Teachers confirm the next topic; Atomi does not manage the full year’s scope and sequence. That is a separate product surface with significant scope of its own.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"callout green\">The prototype demonstrates that the workflow innovation stands independently of AI generation, external integration, and full curriculum mapping. Those are quality multipliers for v2, not prerequisites for v1.<\u002Fdiv>\n  <div class=\"hero\" style=\"margin-top:2rem\">\n    <div class=\"hero-eye\">Closing<\u002Fdiv>\n    <div class=\"hero-title\">Thank you.<\u002Fdiv>\n    <div class=\"hero-hr\"><\u002Fdiv>\n    <div class=\"hero-meta\">This document covers all three parts of the case study. The interactive high-fidelity prototype is designed for live navigation and supports deep-dive Q&amp;A on any of the decisions documented here. <strong>If you're passionate about great education experiences for educators, administrators, and students, I’d love to build with you.<\u002Fstrong><\u002Fdiv>\n    <div class=\"hero-date\" style=\"margin-top:1rem\"><a href=\"https://www.linkedin.com/in/mikestevensonmba/\" target=\"_blank\" rel=\"noopener\" style=\"color:rgba(255,255,255,.7);text-decoration:none;display:inline-flex;align-items:center;gap:.45rem\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"currentColor\" aria-hidden=\"true\"><path d=\"M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.13 1.45-2.13 2.94v5.67H9.37V9h3.41v1.56h.05c.47-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.45C23.2 24 24 23.23 24 22.28V1.72C24 .77 23.2 0 22.22 0z\"><\u002Fpath><\u002Fsvg>Mike Stevenson · 23 April 2026<\u002Fa><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"sec-nav\">\n    <button class=\"btn\" onclick=\"show('s-prototype')\">← Prototype walkthrough<\u002Fbutton>\n    <button class=\"btn\" onclick=\"show('s-intro')\">↑ Back to overview<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fmain>\n<\u002Fdiv>\n\n<script>\nconst SECS=['s-intro','s-signals','s-interview','s-pivot','s-problem','s-why','s-winning','s-concept','s-prototype','s-tradeoffs'];\nconst N=SECS.length;\n\nfunction show(id){\n  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));\n  document.getElementById(id).classList.add('active');\n  document.querySelectorAll('.sb-item').forEach(el=>{\n    const on=el.dataset.sec===id;\n    el.classList.toggle('active',on);\n    el.querySelector('.sb-dot').style.background=on?'var(--blue)':'';\n  });\n  const i=SECS.indexOf(id)+1;\n  document.getElementById('prog-n').textContent=i+' / '+N;\n  document.getElementById('prog-bar').style.width=Math.round(i/N*100)+'%';\n  window.scrollTo(0,0);\n  document.getElementById('main').scrollTop=0;\n}\n\nfunction toggleExp(id){document.getElementById(id).classList.toggle('open')}\n\ndocument.querySelectorAll('.sb-item[data-sec]').forEach(el=>{\n  el.addEventListener('click',()=>show(el.dataset.sec));\n});\n<\u002Fscript>\n\n<!-- ── PROTOTYPE MODAL ── -->\n<div id=\"proto-overlay\" style=\"display:none;position:fixed;inset:0;background:rgba(17,24,39,.7);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(4px)\">\n  <div style=\"position:relative;width:96vw;height:92vh;max-width:1400px;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,.35)\">\n    <iframe id=\"proto-frame\" srcdoc=\"\n&lt;style&gt;\n*{box-sizing:border-box;margin:0;padding:0;}\nbody{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9fafb;font-size:14px;}\n.nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;border-bottom:0.5px solid #e5e7eb;background:#fff;position:sticky;top:0;z-index:10;}\n.nav-logo{display:flex;align-items:center;height:52px;}\n.nav-logo svg{display:block;}\n.nav-links{display:flex;gap:24px;}\n.nav-link{font-size:14px;color:#374151;cursor:pointer;}\n.nav-badge{font-size:10px;background:#177cf9;color:#fff;padding:1px 5px;border-radius:4px;font-weight:600;margin-left:4px;}\n.nav-left{display:flex;align
